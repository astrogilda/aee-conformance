version: "2"

linters:
  default: standard
  enable:
    # This module is a security verifier over untrusted attestation bytes;
    # unchecked errors on the verification path are latent fail-open bugs, so
    # errcheck stays on (the standard set includes it) and gosec is added.
    - gosec
    - revive
  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # package-comment style, not load-bearing here
  exclusions:
    rules:
      # Test files read fixed vector/manifest paths under this repo, never
      # attacker-controlled input, so gosec's file-inclusion rules (G304 file
      # inclusion via variable, G703 path traversal via taint) are categorical
      # false positives there. The verification-path readers in non-test code
      # stay covered.
      - path: _test\.go
        linters:
          - gosec
        text: G304|G703
