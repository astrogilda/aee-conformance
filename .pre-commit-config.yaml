# Non-mutating checks only. The vendored spec (spec/) is byte-identical to the
# upstream in-toto fork and the conformance vectors (vectors/) are hash-pinned
# known-answers, so no hook may rewrite file contents.
ci:
  autofix_prs: false
  autoupdate_schedule: quarterly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
