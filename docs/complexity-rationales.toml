# Rationales for functions carrying `# noqa: C901`.
#
# A few functions exceed the mccabe cyclomatic-complexity threshold of 10
# because the work they do is inherently branch-heavy, not because of tangled
# structure. Each entry records the function, its measured complexity, and why
# the complexity is inherent.

["vectors/accept/gen_valid_vectors.py::verify"]
complexity = 38
rationale = """
The accept-vector generator carries its own independent statement verifier as a
build-time self-check, a deliberate second opinion distinct from the Go and
Python reference verifiers. It replicates the full gate logic (well-formedness,
coverage validity, per-record payload and binding checks, tier derivation), so
its branch count mirrors the specification's, not any avoidable structure.
Decomposing it would not lower the inherent branching and would risk diverging
the self-check from the spec it mirrors.
"""

["vectors/accept/gen_valid_vectors.py::make_statement"]
complexity = 12
rationale = """
make_statement assembles a valid statement from many independent, optional
Options fields (result, signer role, record shape, coverage sets, and so on).
Each option contributes one guarded branch; the complexity is the coordination
of those independent knobs, not tangled control flow.
"""

["vectors/reject/gen_invalid_vectors.py::second_fault_absence"]
complexity = 11
rationale = """
second_fault_absence runs a sequence of independent second-fault checks (root
family, vocabulary, corpus, binding) to assert each reject vector is broken
exactly one way. The checks are independent by construction; the branch count is
the number of fault families guarded, one per family.
"""
